name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Typecheck, Lint, Test, Build, Smoke
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Matrix build across supported LTS versions. If code works on 22
        # but breaks on 24 (or vice-versa), CI catches it automatically.
        # Node 20 is EOL as of 2026-04-30 and no longer in the matrix.
        node-version: [22, 24]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          # Кэшируем node_modules между запусками — ускоряет CI в ~3 раза
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      # Смоук-тест гоняет собранный dist/bin/cli.cjs против реального файлового
      # scaffolding. Защищает от регрессии трёх критических багов, утёкших в
      # 1.0.1: сломанные импорты роутов, CJS вместо ESM, ESM-only зависимости CLI.
      # Идёт после build потому что требует готовый dist/.
      - name: Smoke test
        run: npm run test:smoke
